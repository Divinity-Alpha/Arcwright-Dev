<!-- Arcwright: Game HUD designed in HTML, auto-translated to UE Widget -->
<style>

        left: 0; top: 0;
        width: 1920px;

    }

    }

    }
    .health-text {

        font-weight: bold;
    }
    .score-section {

        right: 40px;

    }

    }
    .ammo-section {
        position: absolute;
        right: 40px;

    }
    .ammo-count {

        color: rgba(255, 255, 255, 0.5);

    }

        position: absolute;
        left: 660px;
        top: 750px;
        width: 600px;
    }

        right: 30px;

    }

        text-align: center;
    }
    .wave-info {
        position: absolute;
        left: 860px;
        top: 30px;
        width: 200px;
    }

        text-align: center;

        height: 60px;
        display: flex;
        flex-direction: row;

        height: 60px;
        background-color: rgba(255, 255, 255, 0.08);
    }
    .ability-key {
        color: rgba(255, 255, 255, 0.5);
        font-size: 11px;
        text-align: center;
    }

        color: #00d4ff;
        font-size: 24px;
        text-align: center;
    }

<div class="hud-root" data-widget-name="RootCanvas">
    
    <!-- Health (top-left) -->
    <div class="health-section" data-widget-name="HealthGroup">
        <span class="health-label">HEALTH</span>
        <div class="health-bar" data-widget="progress" data-percent="75">
            <div class="health-fill"></div>
        </div>
        <span class="health-text">75 / 100</span>
    </div>
    
    <!-- Score (top-right) -->
    <div class="score-section" data-widget-name="ScoreGroup">
        <span class="score-label">SCORE</span>
        <p class="score-value" data-widget-name="ScoreValue">12,450</p>
    </div>
    
    <!-- Wave Info (top-center) -->
    <div class="wave-info" data-widget-name="WaveGroup">
        <p class="wave-text" data-widget-name="WaveText">WAVE 3</p>
        <p class="wave-sub">Enemies Remaining: 8</p>
    </div>
    
    <!-- Crosshair (center) -->
    <div class="crosshair" data-widget-name="Crosshair">
        <span class="crosshair-dot">+</span>
    </div>

    <div class="message-area" data-widget-name="MessageArea">

    </div>

    </div>

        <p class="ammo-count" data-widget-name="AmmoCount">24</p>

    <div class="ability-bar" data-widget-name="AbilityBar">
        <div class="ability-slot" data-widget-name="Ability1">
            <span class="ability-key">Q</span>
            <span class="ability-icon">⚡</span>
        </div>
        <div class="ability-slot" data-widget-name="Ability2">
            <span class="ability-key">E</span>
            <span class="ability-icon">🛡</span>
        </div>
        <div class="ability-slot" data-widget-name="Ability3">
            <span class="ability-key">R</span>
            <span class="ability-icon">🔥</span>
        </div>
        <div class="ability-slot" data-widget-name="Ability4">
            <span class="ability-key">F</span>
            <span class="ability-icon">💊</span>
        </div>
    </div>

</div>
